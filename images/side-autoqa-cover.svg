<svg width="1280" height="800" viewBox="0 0 680 425" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="680" height="425" fill="#0d1117"/>

<!-- Subtle grid lines -->
<line x1="0" y1="106" x2="680" y2="106" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
<line x1="0" y1="212" x2="680" y2="212" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
<line x1="0" y1="318" x2="680" y2="318" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
<line x1="170" y1="0" x2="170" y2="425" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
<line x1="340" y1="0" x2="340" y2="425" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
<line x1="510" y1="0" x2="510" y2="425" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

<!-- Amber glow - left -->
<radialGradient id="glowAmber" cx="30%" cy="50%" r="40%">
  <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
  <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
</radialGradient>
<rect width="680" height="425" fill="url(#glowAmber)"/>

<!-- Cyan glow - right -->
<radialGradient id="glowCyan" cx="72%" cy="50%" r="38%">
  <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1"/>
  <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
</radialGradient>
<rect width="680" height="425" fill="url(#glowCyan)"/>

<!-- ── LEFT CARD: QA 자동화 ── -->
<rect x="60" y="80" width="220" height="265" rx="14" fill="#161b22" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.35"/>

<!-- Playwright-style hexagon icon -->
<g transform="translate(170, 148)">
  <!-- Hexagon -->
  <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19"
    fill="#1a1200" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.9"/>
  <!-- P letter inside -->
  <text x="0" y="12" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800"
    fill="#f59e0b" text-anchor="middle" opacity="0.95">P</text>
</g>

<!-- Label -->
<text x="170" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700"
  fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="0.5">QA 자동화</text>
<text x="170" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="400"
  fill="#f59e0b" text-anchor="middle" opacity="0.6" letter-spacing="1">Playwright</text>

<!-- Mini test rows -->
<g transform="translate(78, 256)">
  <!-- Row 1: PASS -->
  <rect width="184" height="22" rx="5" fill="#0d2010"/>
  <circle cx="12" cy="11" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="24" y="15" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ffffff60">로그인 플로우</text>
  <rect x="140" y="4" width="36" height="14" rx="7" fill="#22c55e18" stroke="#22c55e40" stroke-width="0.5"/>
  <text x="158" y="14" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" fill="#22c55e" text-anchor="middle">PASS</text>
</g>
<g transform="translate(78, 282)">
  <!-- Row 2: PASS -->
  <rect width="184" height="22" rx="5" fill="#0d2010"/>
  <circle cx="12" cy="11" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="24" y="15" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ffffff60">검색 기능</text>
  <rect x="140" y="4" width="36" height="14" rx="7" fill="#22c55e18" stroke="#22c55e40" stroke-width="0.5"/>
  <text x="158" y="14" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" fill="#22c55e" text-anchor="middle">PASS</text>
</g>
<g transform="translate(78, 308)">
  <!-- Row 3: FAIL -->
  <rect width="184" height="22" rx="5" fill="#1a0a0a"/>
  <circle cx="12" cy="11" r="5" fill="#ef4444" opacity="0.9"/>
  <text x="24" y="15" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ffffffa0">메뉴 접속</text>
  <rect x="140" y="4" width="36" height="14" rx="7" fill="#ef444418" stroke="#ef444440" stroke-width="0.5"/>
  <text x="158" y="14" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" fill="#ef4444" text-anchor="middle">FAIL</text>
</g>

<!-- ── FLOW ARROW ── -->
<g transform="translate(316, 200)">
  <!-- Arrow line -->
  <line x1="-28" y1="12" x2="28" y2="12" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="24,7 34,12 24,17" fill="#6b7280" opacity="0.7"/>
  <!-- Label above -->
  <text x="3" y="4" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#6b7280" text-anchor="middle" letter-spacing="0.5">자동 생성</text>
</g>

<!-- ── RIGHT CARD: 이슈 트래킹 ── -->
<rect x="400" y="80" width="220" height="265" rx="14" fill="#061922" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.35"/>

<!-- Issue ticket icon (simplified Linear/Jira style) -->
<g transform="translate(510, 148)">
  <!-- Outer circle -->
  <circle r="38" fill="#021520" stroke="#06b6d4" stroke-width="1.5" stroke-opacity="0.85"/>
  <!-- Bug icon paths -->
  <!-- Body -->
  <ellipse cx="0" cy="3" rx="13" ry="15" fill="none" stroke="#06b6d4" stroke-width="1.8" opacity="0.9"/>
  <!-- Head -->
  <circle cx="0" cy="-14" r="7" fill="none" stroke="#06b6d4" stroke-width="1.8" opacity="0.9"/>
  <!-- Antennae -->
  <line x1="-4" y1="-19" x2="-8" y2="-26" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="4" y1="-19" x2="8" y2="-26" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Legs left -->
  <line x1="-13" y1="-2" x2="-22" y2="-6" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="-13" y1="5" x2="-22" y2="5" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="-13" y1="12" x2="-22" y2="16" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <!-- Legs right -->
  <line x1="13" y1="-2" x2="22" y2="-6" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="13" y1="5" x2="22" y2="5" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="13" y1="12" x2="22" y2="16" stroke="#06b6d4" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
</g>

<!-- Label -->
<text x="510" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700"
  fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="0.5">이슈 트래킹</text>
<text x="510" y="232" font-family="system-ui,-apple-system,sans-serif" font-size="9" font-weight="400"
  fill="#06b6d4" text-anchor="middle" opacity="0.6" letter-spacing="1">Auto-generated</text>

<!-- Issue card -->
<rect x="418" y="254" width="184" height="78" rx="6" fill="#0a2030" stroke="#06b6d450" stroke-width="0.5"/>
<!-- Badge -->
<rect x="428" y="262" width="60" height="14" rx="7" fill="#06b6d418" stroke="#06b6d440" stroke-width="0.5"/>
<text x="458" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="7.5" fill="#06b6d4" text-anchor="middle">BUG · AUTO</text>
<!-- Title -->
<text x="428" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ffffffa0">[TC-003] 메뉴 접속 실패</text>
<!-- Meta -->
<text x="428" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#ffffff35">담당자 자동 배정 · 스크린샷 첨부</text>
<!-- Priority dot -->
<circle cx="584" cy="268" r="4" fill="#ef4444" opacity="0.8"/>

<!-- ── BOTTOM STATUS BAR ── -->
<rect x="60" y="370" width="560" height="30" rx="8" fill="#161b22"/>
<!-- Pass -->
<circle cx="90" cy="385" r="4" fill="#22c55e" opacity="0.5"/>
<text x="100" y="389" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#22c55e80">2 passed</text>
<line x1="134" y1="375" x2="134" y2="395" stroke="#ffffff0d" stroke-width="0.5"/>
<!-- Fail -->
<circle cx="150" cy="385" r="4" fill="#ef4444" opacity="0.5"/>
<text x="160" y="389" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#ef444480">1 failed</text>
<line x1="194" y1="375" x2="194" y2="395" stroke="#ffffff0d" stroke-width="0.5"/>
<!-- Issue created -->
<circle cx="210" cy="385" r="4" fill="#06b6d4" opacity="0.5"/>
<text x="220" y="389" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#06b6d480">1 issue created</text>
<!-- Right label -->
<text x="608" y="389" font-family="system-ui,-apple-system,sans-serif" font-size="8" fill="#ffffff20" text-anchor="end">AutoQA v2.1</text>

</svg>
